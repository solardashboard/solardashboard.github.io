<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospection — SolarDashboard</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sun: #f59e0b;
      --sun-dark: #d97706;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --sidebar: 340px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.25rem;
      background: var(--dark-2);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      z-index: 200;
    }
    .back-btn {
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.3rem;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--text); }
    .topbar-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 800; font-size: 1rem; letter-spacing: -0.02em;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--sun), var(--sun-dark));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .topbar-sep { color: var(--dark-3); }
    .topbar-title { font-size: 0.9rem; color: var(--muted); font-weight: 500; }

    .topbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .stat-chip {
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.2);
      color: var(--sun);
      font-size: 0.78rem; font-weight: 700;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }
    .btn-export {
      background: linear-gradient(135deg, var(--sun), var(--sun-dark));
      color: var(--dark);
      font-weight: 700; font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-export:hover { opacity: 0.88; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      background: var(--dark-2);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-head h2 {
      font-size: 0.85rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .search-box {
      display: flex; align-items: center;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 0 0.75rem;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .search-box span { font-size: 0.9rem; color: var(--muted); }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.55rem 0;
      font-family: inherit;
    }
    .search-box input::placeholder { color: var(--muted); }

    .filter-row {
      display: flex; gap: 0.5rem;
    }
    .filter-btn {
      flex: 1;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 0.78rem; font-weight: 600;
      padding: 0.4rem 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(245,158,11,0.12);
      border-color: rgba(245,158,11,0.35);
      color: var(--sun);
    }

    /* Lead list */
    .lead-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .lead-list::-webkit-scrollbar { width: 4px; }
    .lead-list::-webkit-scrollbar-track { background: transparent; }
    .lead-list::-webkit-scrollbar-thumb { background: var(--dark-3); border-radius: 4px; }

    .lead-item {
      display: flex; align-items: flex-start; gap: 0.85rem;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .lead-item:hover { background: rgba(255,255,255,0.04); }
    .lead-item.selected { background: rgba(245,158,11,0.08); border-left: 3px solid var(--sun); padding-left: calc(1.25rem - 3px); }

    .lead-score {
      width: 38px; height: 38px; min-width: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.88rem;
    }
    .score-high { background: rgba(34,197,94,0.15); color: #4ade80; }
    .score-mid  { background: rgba(245,158,11,0.15); color: var(--sun); }
    .score-low  { background: rgba(148,163,184,0.1); color: var(--muted); }

    .lead-info { flex: 1; min-width: 0; }
    .lead-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lead-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .lead-status {
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      white-space: nowrap;
    }
    .s-new      { background: rgba(56,189,248,0.15); color: #38bdf8; }
    .s-contact  { background: rgba(245,158,11,0.15); color: var(--sun); }
    .s-signed   { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .s-lost     { background: rgba(239,68,68,0.15);  color: #f87171; }

    /* ── MAP ── */
    .map-wrap {
      flex: 1;
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
      background: var(--dark);
    }

    /* Detail panel */
    .detail-panel {
      position: absolute;
      bottom: 1.5rem; right: 1.5rem;
      width: 300px;
      background: var(--dark-2);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 16px;
      padding: 1.25rem;
      z-index: 500;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .detail-panel.visible { display: block; }
    .detail-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1rem; padding: 0.25rem;
    }
    .detail-close:hover { color: var(--text); }
    .detail-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--sun);
      margin-bottom: 0.35rem;
    }
    .detail-name {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.6rem; margin-bottom: 1rem;
    }
    .detail-field { background: var(--dark-3); border-radius: 8px; padding: 0.6rem 0.75rem; }
    .detail-field-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; }
    .detail-field-val { font-size: 0.88rem; font-weight: 700; }
    .detail-actions { display: flex; gap: 0.5rem; }
    .detail-btn {
      flex: 1;
      font-size: 0.8rem; font-weight: 700;
      padding: 0.5rem;
      border-radius: 8px; border: none; cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .detail-btn:hover { opacity: 0.85; }
    .detail-btn.primary {
      background: linear-gradient(135deg, var(--sun), var(--sun-dark));
      color: var(--dark);
    }
    .detail-btn.secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      background: var(--dark-2);
      color: var(--text);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      padding: 0;
    }
    .leaflet-popup-content { margin: 0; }
    .leaflet-popup-tip { background: var(--dark-2); }
    .popup-inner { padding: 0.9rem 1.1rem; }
    .popup-inner strong { font-size: 0.95rem; display: block; margin-bottom: 0.35rem; }
    .popup-inner .pop-meta { font-size: 0.8rem; color: var(--muted); }
    .popup-inner .pop-score {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 0.5rem;
      font-size: 0.8rem; font-weight: 700; color: #4ade80;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="../" class="back-btn">← Accueil</a>
    <div class="topbar-sep">/</div>
    <div class="topbar-logo">
      <div class="logo-icon">☀️</div>
      SolarDashboard
    </div>
    <div class="topbar-sep">/</div>
    <span class="topbar-title">Prospection</span>
    <div class="topbar-right">
      <span class="stat-chip" id="countChip">— prospects</span>
      <button class="btn-export" onclick="exportCSV()">📤 Exporter CSV</button>
    </div>
  </div>

  <div class="main">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>Prospects</h2>
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Rechercher..." oninput="filterLeads()" />
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">Tous</button>
          <button class="filter-btn" data-filter="new" onclick="setFilter(this)">Nouveaux</button>
          <button class="filter-btn" data-filter="contact" onclick="setFilter(this)">En cours</button>
          <button class="filter-btn" data-filter="signed" onclick="setFilter(this)">Signés</button>
        </div>
      </div>
      <div class="lead-list" id="leadList"></div>
    </aside>

    <!-- MAP -->
    <div class="map-wrap">
      <div id="map"></div>

      <!-- DETAIL PANEL -->
      <div class="detail-panel" id="detailPanel">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-label">Fiche prospect</div>
        <div class="detail-name" id="dp-name"></div>
        <div class="detail-grid">
          <div class="detail-field">
            <div class="detail-field-label">Score</div>
            <div class="detail-field-val" id="dp-score"></div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Puissance</div>
            <div class="detail-field-val" id="dp-power"></div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Surface</div>
            <div class="detail-field-val" id="dp-surface"></div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Statut</div>
            <div class="detail-field-val" id="dp-status"></div>
          </div>
        </div>
        <div class="detail-actions">
          <button class="detail-btn primary">📞 Contacter</button>
          <button class="detail-btn secondary">📋 Voir fiche</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── DATA ─────────────────────────────────────────────────────────────────
    const LEADS = [
      { id:1,  name:"Mairie de Clermont",       lat:45.777,  lng:3.087,  score:92, power:"48 kWc", surface:"320 m²", status:"signed",  statusLabel:"Signé" },
      { id:2,  name:"École Pasteur",             lat:45.783,  lng:3.079,  score:88, power:"36 kWc", surface:"240 m²", status:"contact", statusLabel:"En cours" },
      { id:3,  name:"Hangar Agricole Moreau",    lat:45.762,  lng:3.102,  score:85, power:"120 kWc",surface:"800 m²", status:"new",     statusLabel:"Nouveau" },
      { id:4,  name:"Entrepôt Logistique Sud",   lat:45.750,  lng:3.095,  score:79, power:"200 kWc",surface:"1400 m²",status:"contact", statusLabel:"En cours" },
      { id:5,  name:"Centre commercial Jaude",  lat:45.789,  lng:3.083,  score:76, power:"90 kWc", surface:"600 m²", status:"new",     statusLabel:"Nouveau" },
      { id:6,  name:"Gymnase Jules Ferry",       lat:45.775,  lng:3.110,  score:71, power:"24 kWc", surface:"160 m²", status:"lost",    statusLabel:"Perdu" },
      { id:7,  name:"Bâtiment industriel Riom", lat:45.895,  lng:3.113,  score:68, power:"80 kWc", surface:"540 m²", status:"new",     statusLabel:"Nouveau" },
      { id:8,  name:"Résidence Les Volcans",     lat:45.770,  lng:3.065,  score:63, power:"18 kWc", surface:"120 m²", status:"contact", statusLabel:"En cours" },
      { id:9,  name:"Fromagerie Chaumont",       lat:45.591,  lng:3.117,  score:58, power:"30 kWc", surface:"200 m²", status:"new",     statusLabel:"Nouveau" },
      { id:10, name:"EHPAD Fleurs des Champs",   lat:45.802,  lng:3.055,  score:55, power:"22 kWc", surface:"148 m²", status:"contact", statusLabel:"En cours" },
      { id:11, name:"Coopérative Céréales Est",  lat:45.835,  lng:3.180,  score:91, power:"160 kWc",surface:"1100 m²",status:"signed",  statusLabel:"Signé" },
      { id:12, name:"Piscine municipale Gerzat", lat:45.812,  lng:3.099,  score:83, power:"40 kWc", surface:"270 m²", status:"new",     statusLabel:"Nouveau" },
    ];

    // ── STATE ────────────────────────────────────────────────────────────────
    let currentFilter = 'all';
    let currentSearch = '';
    let selectedId = null;
    const markerMap = {};

    // ── MAP INIT ─────────────────────────────────────────────────────────────
    const map = L.map('map', { zoomControl: true }).setView([45.78, 3.09], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 19
    }).addTo(map);

    // Custom icon factory
    function makeIcon(score, selected) {
      const color = score >= 80 ? '#4ade80' : score >= 60 ? '#f59e0b' : '#94a3b8';
      const size = selected ? 38 : 30;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="13" fill="${color}" fill-opacity="${selected ? 1 : 0.85}" stroke="${selected ? '#fff' : color}" stroke-width="${selected ? 2.5 : 1.5}"/>
        <text x="15" y="19.5" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" font-weight="800" fill="${score >= 80 ? '#0f172a' : score >= 60 ? '#0f172a' : '#1e293b'}">${score}</text>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });
    }

    const cluster = L.markerClusterGroup({
      maxClusterRadius: 50,
      iconCreateFunction(c) {
        const n = c.getChildCount();
        return L.divIcon({
          html: `<div style="width:42px;height:42px;border-radius:50%;background:rgba(245,158,11,0.85);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:#0f172a;border:2px solid rgba(255,255,255,0.3)">${n}</div>`,
          className: '', iconSize: [42,42], iconAnchor: [21,21]
        });
      }
    });

    LEADS.forEach(lead => {
      const m = L.marker([lead.lat, lead.lng], { icon: makeIcon(lead.score, false) });
      m.bindPopup(`
        <div class="popup-inner">
          <strong>${lead.name}</strong>
          <div class="pop-meta">${lead.power} · ${lead.surface}</div>
          <div class="pop-score">⚡ Score ${lead.score}/100</div>
        </div>
      `, { offset: [0, -4] });
      m.on('click', () => selectLead(lead.id));
      markerMap[lead.id] = m;
      cluster.addLayer(m);
    });
    map.addLayer(cluster);

    // ── SIDEBAR ──────────────────────────────────────────────────────────────
    function scoreClass(s) { return s >= 80 ? 'score-high' : s >= 60 ? 'score-mid' : 'score-low'; }
    function statusClass(s) {
      return { new: 's-new', contact: 's-contact', signed: 's-signed', lost: 's-lost' }[s] || 's-new';
    }

    function filteredLeads() {
      return LEADS.filter(l => {
        const matchFilter = currentFilter === 'all' || l.status === currentFilter;
        const matchSearch = l.name.toLowerCase().includes(currentSearch.toLowerCase());
        return matchFilter && matchSearch;
      });
    }

    function renderList() {
      const fl = filteredLeads();
      document.getElementById('countChip').textContent = `${fl.length} prospect${fl.length > 1 ? 's' : ''}`;
      const el = document.getElementById('leadList');
      el.innerHTML = fl.map(l => `
        <div class="lead-item ${selectedId === l.id ? 'selected' : ''}" onclick="selectLead(${l.id})">
          <div class="lead-score ${scoreClass(l.score)}">${l.score}</div>
          <div class="lead-info">
            <div class="lead-name">${l.name}</div>
            <div class="lead-meta">${l.power} · ${l.surface}</div>
          </div>
          <span class="lead-status ${statusClass(l.status)}">${l.statusLabel}</span>
        </div>
      `).join('');
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderList();
    }

    function filterLeads() {
      currentSearch = document.getElementById('searchInput').value;
      renderList();
    }

    // ── SELECT LEAD ──────────────────────────────────────────────────────────
    function selectLead(id) {
      selectedId = id;
      const lead = LEADS.find(l => l.id === id);
      if (!lead) return;

      // Update markers
      Object.entries(markerMap).forEach(([lid, m]) => {
        m.setIcon(makeIcon(LEADS.find(l => l.id == lid).score, lid == id));
      });

      // Pan map
      map.setView([lead.lat, lead.lng], Math.max(map.getZoom(), 13), { animate: true });

      // Detail panel
      document.getElementById('dp-name').textContent    = lead.name;
      document.getElementById('dp-score').textContent   = `${lead.score}/100`;
      document.getElementById('dp-power').textContent   = lead.power;
      document.getElementById('dp-surface').textContent = lead.surface;
      document.getElementById('dp-status').textContent  = lead.statusLabel;
      document.getElementById('detailPanel').classList.add('visible');

      // Re-render list
      renderList();
    }

    function closeDetail() {
      selectedId = null;
      document.getElementById('detailPanel').classList.remove('visible');
      Object.entries(markerMap).forEach(([lid, m]) => {
        m.setIcon(makeIcon(LEADS.find(l => l.id == lid).score, false));
      });
      renderList();
    }

    // ── EXPORT CSV ───────────────────────────────────────────────────────────
    function exportCSV() {
      const fl = filteredLeads();
      const header = ['Nom','Score','Puissance','Surface','Statut','Lat','Lng'];
      const rows = fl.map(l => [l.name, l.score, l.power, l.surface, l.statusLabel, l.lat, l.lng]);
      const csv = [header, ...rows].map(r => r.join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'prospects_solaires.csv';
      a.click();
    }

    // ── INIT ─────────────────────────────────────────────────────────────────
    renderList();
  </script>
</body>
</html>
